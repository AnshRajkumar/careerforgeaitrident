            <h1 class="title-small">AI Career <span class="accent">Guidance</span></h1>

            <!-- Setup Phase -->
            <div id="setupPhase" style="background: rgba(255,255,255,0.03); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.08); width: 100%; max-width: 600px; text-align: left; margin: 30px auto; box-shadow: 0 10px 40px rgba(0,0,0,0.5); backdrop-filter: blur(16px);">
                <label style="color: #e2e8f0; font-weight: 500; display: block; margin-bottom: 8px;">Target Career Role*</label>
                <input type="text" id="targetRole" placeholder="e.g. Data Scientist, Frontend Developer" style="margin-bottom: 30px; color: white; width: 100%; padding: 16px 20px; font-size: 1.05rem; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; outline: none; transition: border-color 0.3s;" required onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'">
                
                <label style="color: #e2e8f0; font-weight: 500; display: block; margin-bottom: 8px;">Resume Document (Optional)</label>
                <input type="file" id="resumeFile" accept="application/pdf" style="display: block; margin-bottom: 30px; color: #cbd5e1; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px; width: 100%; border: 1px solid rgba(255,255,255,0.1);">
                
                <button id="startGuidanceBtn" style="width: 100%; padding: 18px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; border-radius: 12px; color: white; font-size: 1.1rem; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(99,102,241,0.4); transition: transform 0.2s, box-shadow 0.2s;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 20px rgba(99,102,241,0.6)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 15px rgba(99,102,241,0.4)'">Start Guidance Session</button>
            </div>

            <!-- Chat Phase -->
            <div id="chatPhase" style="display: none; width: 100%; max-width: 800px; height: 60vh; flex-direction: column; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; margin: 20px auto; box-shadow: 0 10px 40px rgba(0,0,0,0.5); backdrop-filter: blur(16px);">
                <div id="chatMessages" style="flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; text-align: left;">
                </div>
                <div style="display: flex; gap: 10px; padding: 20px; background: rgba(0,0,0,0.3); border-top: 1px solid rgba(255,255,255,0.1);">
                    <input type="text" id="chatInput" placeholder="Ask VarGo anything about your career..." style="flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 15px; color: white; outline: none; transition: border-color 0.3s;" onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'">
                    <button id="sendBtn" style="padding: 10px 20px; background: #6366f1; border: none; border-radius: 10px; color: white; cursor: pointer; font-weight: 600; transition: background 0.3s;" onmouseover="this.style.background='#4f46e5'" onmouseout="this.style.background='#6366f1'">Send</button>

    <script src="/js/config.js"></script>`n    <script src="/js/main.js"></script>
    <script>
        const setupPhase = document.getElementById('setupPhase');
        const chatPhase = document.getElementById('chatPhase');
        const targetRole = document.getElementById('targetRole');
        const resumeFile = document.getElementById('resumeFile');
        const startGuidanceBtn = document.getElementById('startGuidanceBtn');
        
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        function appendMessage(role, text) {
            const div = document.createElement('div');
            if(role === 'user') {
                div.style.cssText = 'align-self: flex-end; background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; padding: 15px; border-radius: 15px; font-size: 0.95rem; max-width: 80%;';
            } else {
                div.style.cssText = 'align-self: flex-start; background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.2); padding: 15px; border-radius: 15px; font-size: 0.95rem; max-width: 80%; white-space: pre-wrap; line-height: 1.6;';
            }
            // Simple markdown-style bold replacement for readability
            div.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            chatMessages.appendChild(div);
            // Auto scroll
            requestAnimationFrame(() => {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        }

        startGuidanceBtn.addEventListener('click', async () => {
            const role = targetRole.value.trim();
            if(!role) {
                alert("Please enter a target career role.");
                return;
            }

            startGuidanceBtn.textContent = "Initializing AI Context...";
            startGuidanceBtn.disabled = true;

            const formData = new FormData();
            formData.append("role", role);
            if(resumeFile.files.length > 0) {
                formData.append("file", resumeFile.files[0]);
            }

            try {
                const res = await fetch(`${API_BASE_URL}/start_guidance`, {
                    method: 'POST',
                    body: formData
                });

                if(res.ok) {
                    // Switch UI
                    setupPhase.style.display = 'none';
                    chatPhase.style.display = 'flex';
                    
                    // Initial hidden prompt to kick off guidance
                    const initialPrompt = `I am aiming for the role of ${role}. I have provided my context. Please provide me all the details and the absolute best way to build my career roadmap.`;
                    
                    // Show a loading indicator
                    appendMessage('ai', 'Analyzing your profile and generating your career roadmap...');
                    const loadingElement = chatMessages.lastChild;

                    try {
                        const chatRes = await fetch(`${API_BASE_URL}/vargo_chat`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ query: initialPrompt })
                        });
                        const data = await chatRes.json();
                        chatMessages.removeChild(loadingElement);
                        appendMessage('ai', data.response);
                    } catch(err) {
                        chatMessages.removeChild(loadingElement);
                        appendMessage('ai', 'Error connecting to VarGo.');
                    }
                } else {
                    alert("Failed to initialize guidance context.");
                    startGuidanceBtn.textContent = "Start Guidance Session";
                    startGuidanceBtn.disabled = false;
                }
            } catch(e) {
                alert("Error connecting to server. Is backend running?");
                startGuidanceBtn.textContent = "Start Guidance Session";
                startGuidanceBtn.disabled = false;
            }
        });

        async function sendToVarGo(text) {
            appendMessage('user', text);
            appendMessage('ai', '...');
            const loadingElement = chatMessages.lastChild;
            
            try {
                const res = await fetch(`${API_BASE_URL}/vargo_chat`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ query: text })
                });
                const data = await res.json();
                chatMessages.removeChild(loadingElement);
                appendMessage('ai', data.response);
            } catch(e) {
                chatMessages.removeChild(loadingElement);
                appendMessage('ai', 'Error connecting to VarGo.');
            }
        }

        sendBtn.addEventListener('click', () => {
            const text = chatInput.value.trim();
            if(!text) return;
            chatInput.value = '';
            sendToVarGo(text);
        });

        chatInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const text = chatInput.value.trim();
                if(!text) return;
                chatInput.value = '';
                sendToVarGo(text);
            }
        });
    </script>
