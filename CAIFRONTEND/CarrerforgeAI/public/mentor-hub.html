<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentor Hub — CareerforgeAI</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; background: #06060f; color: white; }
        
        /* Sidebar */
        .hub-sidebar {
            width: 280px; background: rgba(255,255,255,0.03); border-right: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; padding: 20px;
        }
        .hub-logo { font-size: 1.5rem; font-weight: 800; margin-bottom: 40px; text-decoration: none; color: white; }
        .hub-nav-item {
            padding: 15px 20px; margin-bottom: 10px; border-radius: 12px; cursor: pointer;
            color: #cbd5e1; font-weight: 600; transition: all 0.3s;
        }
        .hub-nav-item:hover { background: rgba(255,255,255,0.05); }
        .hub-nav-item.active { background: linear-gradient(135deg, rgba(99,102,241,0.2), #1e1b4b); color: white; border-left: 4px solid #6366f1; }
        
        /* Main Content Area */
        .hub-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .hub-header { padding: 20px 30px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        .hub-content { flex: 1; overflow: auto; position: relative; }

        /* Messages Section */
        .messages-container { display: flex; height: 100%; }
        .chat-list {
            width: 300px; border-right: 1px solid rgba(255,255,255,0.1); overflow-y: auto;
        }
        .chat-user {
            padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: background 0.3s;
        }
        .chat-user:hover, .chat-user.active { background: rgba(255,255,255,0.05); }
        .chat-username { font-weight: 700; color: #e2e8f0; margin-bottom: 5px; }
        .chat-preview { font-size: 0.85rem; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .chat-window { flex: 1; display: flex; flex-direction: column; }
        .chat-history { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; }
        .msg-bubble { max-width: 70%; padding: 12px 18px; border-radius: 20px; font-size: 0.95rem; line-height: 1.4; }
        .msg-received { background: rgba(255,255,255,0.08); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-sent { background: linear-gradient(135deg, #6366f1, #8b5cf6); align-self: flex-end; border-bottom-right-radius: 4px; }
        
        .chat-input-area { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 10px; }
        .chat-input-area input {
            flex: 1; padding: 15px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.5); color: white; outline: none; font-size: 1rem;
        }
        .chat-input-area input:focus { border-color: #6366f1; }
        .btn-send {
            padding: 0 30px; border-radius: 30px; border: none; background: #6366f1; color: white;
            font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn-send:hover { background: #4f46e5; }

        /* VarGo Frame */
        #vargoFrame { width: 100%; height: 100%; border: none; display: none; }
        #messagesSection { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="hub-sidebar">
        <a href="/" class="hub-logo">CareerForge<span class="accent">AI</span> <span style="font-size:1rem;color:#94a3b8;font-weight:400;">Mentor Hub</span></a>
        
        <div class="hub-nav-item active" onclick="switchTab('messages')" id="nav-messages">
            💬 Student Messages
        </div>
        <div class="hub-nav-item" onclick="switchTab('vargo')" id="nav-vargo">
            🤖 VarGo Assistant
        </div>
        <div style="flex:1;"></div>
        <div class="hub-nav-item" id="logoutBtn" style="color:#f87171;">🚪 Logout</div>
    </div>

    <div class="hub-main">
        <div class="hub-header">
            <h2 id="headerTitle" style="font-weight: 600;">Student Messages</h2>
            <div id="mentorProfileName" style="color: #94a3b8; font-weight: 500;">Mentor</div>
        </div>
        <div class="hub-content">
            <!-- Messages Section -->
            <div id="messagesSection" class="messages-container">
                <div class="chat-list" id="chatList">
                    <!-- Dynamic chat list -->
                    <div style="padding: 20px; color: #94a3b8; text-align: center; margin-top: 50px;">
                        Loading messages...
                    </div>
                </div>
                <div class="chat-window">
                    <div class="chat-history" id="chatHistory">
                        <div style="color: #94a3b8; text-align: center; margin-top: auto; margin-bottom: auto;">
                            Select a student to start messaging.
                        </div>
                    </div>
                    <div class="chat-input-area" style="display: none;" id="chatInputArea">
                        <button id="videoCallBtn" class="btn-mic" style="margin-right: 5px; color: #10b981; border-color: #10b981;" title="Start WebRTC Video Call">📞</button>
                        <input type="text" id="messageInput" placeholder="Type a message...">
                        <button class="btn-send" id="sendBtn">Send</button>
                    </div>
                </div>
            </div>

            <!-- VarGo Assistant Frame -->
            <iframe id="vargoFrame" src="/vargo"></iframe>
        </div>
    </div>

    <!-- Firebase + Scripts -->
    <script type="module" src="/js/mentor-hub.js"></script>
    <script>
        function switchTab(tab) {
            document.querySelectorAll('.hub-nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-' + tab).classList.add('active');
            
            if(tab === 'messages') {
                document.getElementById('messagesSection').style.display = 'flex';
                document.getElementById('vargoFrame').style.display = 'none';
                document.getElementById('headerTitle').textContent = 'Student Messages';
            } else if(tab === 'vargo') {
                document.getElementById('messagesSection').style.display = 'none';
                document.getElementById('vargoFrame').style.display = 'block';
                document.getElementById('headerTitle').textContent = 'VarGo AI Assistant';
            }
        }
    </script>
</body>
</html>
