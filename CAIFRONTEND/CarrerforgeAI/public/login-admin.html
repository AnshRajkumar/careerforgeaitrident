<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — CareerforgeAI</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }
        .content {
            justify-content: center;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(20px);
            margin-top: 30px;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: left;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #f43f5e; /* Red accent for admin */
        }
        .form-group input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            border-color: #f43f5e;
            background: rgba(255, 255, 255, 0.08);
        }
        .btn-auth {
            background: #f43f5e;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn-auth:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(244, 63, 94, 0.3);
        }
        .auth-footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #64748b;
        }
        .back-home {
            position: absolute;
            top: 40px;
            left: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #cad4e0;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 10;
        }
        .admin-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(244, 63, 94, 0.1);
            border: 1px solid rgba(244, 63, 94, 0.3);
            border-radius: 8px;
            color: #f43f5e;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }
    </style>
</head>
<body class="page-loaded">
    <div class="bg-overlay"></div>
    
    <a href="/" class="back-home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back to Home
    </a>

    <main class="content">
        <div class="auth-container">
            <div class="admin-badge">Secure Access</div>
            <h1 class="title-small">Admin <span class="accent" style="background: linear-gradient(135deg, #fb7185, #f43f5e); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Portal</span></h1>
            <p class="subtitle">Enter administrative credentials to proceed.</p>

            <div class="auth-card fade-in">
                <form id="adminLoginForm" class="auth-form">
                    <div class="form-group">
                        <label for="email">Admin Email</label>
                        <input type="email" id="email" placeholder="admin@careerforge.ai" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label for="secretKey">Secret Passphrase</label>
                        <input type="password" id="secretKey" placeholder="Enter Admin Key" required>
                    </div>
                    <button type="submit" class="btn-auth">Verify & Login</button>
                </form>

                <div class="auth-footer">
                    Not an admin? <a href="/login" style="color: #6366f1;">Standard Login</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // Mock Admin Login — replace with real FastAPI auth when ready
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userName', 'Administrator');
            localStorage.setItem('userRole', 'admin');
            window.location.href = '/admin-dashboard';
        });
    </script>
</body>
</html>
