<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — CareerforgeAI</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .dashboard-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 80px 30px 40px;
        }
        .dash-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 28px 24px;
            backdrop-filter: blur(20px);
            text-align: center;
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #818cf8, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-label { color: #64748b; font-size: 0.85rem; margin-top: 6px; }

        /* Review Table */
        .reviews-table-wrap {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            overflow: hidden;
            backdrop-filter: blur(20px);
        }
        .table-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .table-header h2 { font-size: 1.1rem; font-weight: 700; }
        .badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .badge-pending  { background: rgba(234,179,8,0.15); color: #fde047; border: 1px solid rgba(234,179,8,0.3); }
        .badge-reviewed { background: rgba(99,102,241,0.15); color: #818cf8; border: 1px solid rgba(99,102,241,0.3); }
        .badge-resolved { background: rgba(34,197,94,0.15);  color: #86efac; border: 1px solid rgba(34,197,94,0.3); }

        table { width: 100%; border-collapse: collapse; }
        th {
            background: rgba(255,255,255,0.03);
            padding: 14px 20px;
            font-size: 0.78rem;
            color: #64748b;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        td {
            padding: 16px 20px;
            font-size: 0.9rem;
            color: #cad4e0;
            border-top: 1px solid rgba(255,255,255,0.05);
            vertical-align: top;
        }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .review-msg { max-width: 340px; line-height: 1.5; }
        .rating-stars { color: #fbbf24; letter-spacing: 2px; }
        .action-select {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 6px 10px;
            color: #cad4e0;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .action-select:focus { outline: none; border-color: #6366f1; }

        .loading-msg { text-align: center; color: #64748b; padding: 60px; font-size: 1rem; }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            background: rgba(244,63,94,0.1);
            border: 1px solid rgba(244,63,94,0.3);
            border-radius: 20px;
            color: #fb7185;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        @media (max-width: 768px) {
            .stats-row { grid-template-columns: 1fr 1fr; }
            table { font-size: 0.8rem; }
            td, th { padding: 12px 14px; }
        }
    </style>
</head>
<body class="page-loaded">
    <div class="bg-overlay"></div>

    <a href="/" class="back-home" style="position:absolute;top:30px;left:30px;display:flex;align-items:center;gap:8px;color:#cad4e0;font-size:0.9rem;font-weight:500;z-index:10;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Home
    </a>

    <main class="content" style="flex-direction: column; align-items: flex-start; padding-top: 80px;">
        <div class="dashboard-container">
            <!-- Header -->
            <div class="dash-header">
                <div>
                    <span class="admin-badge">🛡️ Admin Dashboard</span>
                    <h1 class="title-small" style="margin-top: 12px;">
                        Review <span class="accent">Manager</span>
                    </h1>
                    <p class="subtitle" style="font-size: 0.95rem; margin-top: 6px;">Monitor and manage user feedback in real-time.</p>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-row" id="statsRow">
                <div class="stat-card">
                    <div class="stat-value" id="statTotal">–</div>
                    <div class="stat-label">Total Reviews</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statPending" style="background: linear-gradient(135deg, #fde047, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">–</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statResolved" style="background: linear-gradient(135deg, #86efac, #22c55e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">–</div>
                    <div class="stat-label">Resolved</div>
                </div>
            </div>

            <!-- Reviews Table -->
            <div class="reviews-table-wrap">
                <div class="table-header">
                    <h2>💬 User Feedback</h2>
                    <button onclick="loadReviews()" style="background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.3);border-radius:10px;padding:8px 16px;color:#818cf8;cursor:pointer;font-size:0.85rem;">🔄 Refresh</button>
                </div>
                <div id="tableContainer">
                    <p class="loading-msg">⏳ Loading reviews…</p>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/config.js"></script>`n    <script>
        const BACKEND_URL = API_BASE_URL;

        function renderStars(rating) {
            if (!rating) return '<span style="color:#64748b;">No rating</span>';
            return '⭐'.repeat(rating);
        }

        function formatDate(iso) {
            if (!iso) return '–';
            return new Date(iso).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });
        }

        async function updateStatus(id, newStatus) {
            try {
                await fetch(`${BACKEND_URL}/api/reviews/${id}/status?new_status=${newStatus}`, { method: 'PATCH' });
            } catch (e) { alert('Failed to update status.'); }
        }

        async function loadReviews() {
            const container = document.getElementById('tableContainer');
            container.innerHTML = '<p class="loading-msg">⏳ Fetching reviews…</p>';

            try {
                const res = await fetch(`${BACKEND_URL}/api/reviews?limit=100`);
                const data = await res.json();
                const reviews = data.reviews;
                const total = data.total;

                // Update stats
                document.getElementById('statTotal').textContent = total;
                const pending  = reviews.filter(r => r.status === 'pending').length;
                const resolved = reviews.filter(r => r.status === 'resolved').length;
                document.getElementById('statPending').textContent = pending;
                document.getElementById('statResolved').textContent = resolved;

                if (reviews.length === 0) {
                    container.innerHTML = '<p class="loading-msg">No reviews yet. Be the first! 🚀</p>';
                    return;
                }

                container.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Message</th>
                                <th>Rating</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="reviewsBody"></tbody>
                    </table>
                `;

                const tbody = document.getElementById('reviewsBody');
                reviews.forEach(r => {
                    const statusClass = `badge badge-${r.status}`;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${r.name || 'Anonymous'}</strong><br><span style="color:#64748b;font-size:0.8rem;">${r.email || ''}</span></td>
                        <td><div class="review-msg">${r.message}</div></td>
                        <td><span class="rating-stars">${renderStars(r.rating)}</span></td>
                        <td style="white-space:nowrap;color:#64748b;">${formatDate(r.created_at)}</td>
                        <td><span class="${statusClass}">${r.status}</span></td>
                        <td>
                            <select class="action-select" onchange="updateStatus('${r.id}', this.value)">
                                <option value="pending"  ${r.status === 'pending'  ? 'selected' : ''}>Pending</option>
                                <option value="reviewed" ${r.status === 'reviewed' ? 'selected' : ''}>Reviewed</option>
                                <option value="resolved" ${r.status === 'resolved' ? 'selected' : ''}>Resolved</option>
                            </select>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (err) {
                container.innerHTML = `<p class="loading-msg">⚠️ Cannot connect to the backend. Make sure FastAPI is running on port 8000.</p>`;
                document.getElementById('statTotal').textContent = '–';
                document.getElementById('statPending').textContent = '–';
                document.getElementById('statResolved').textContent = '–';
            }
        }

        loadReviews();
    </script>
</body>
</html>
