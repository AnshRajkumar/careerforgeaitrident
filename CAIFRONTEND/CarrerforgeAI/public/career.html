<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Build your AI-powered career roadmap with CareerforgeAI.">
    <title>Build Your Roadmap — CareerforgeAI</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/career.css">
</head>
    <!-- Hamburger Menu Button -->
    <button class="menu-toggle" id="menuToggle" aria-label="Toggle Menu" style="left: 40px; top: 40px;">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-text">Menu</div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-group">
                <a href="/" class="sidebar-link">
                    <span class="link-icon">🏠</span>
                    <span>Home</span>
                </a>
            </div>

            <div class="nav-group">
                <div class="nav-label">Support</div>
                <a href="/contact" class="sidebar-link">
                    <span class="link-icon">📞</span>
                    <span>Contact Developers</span>
                </a>
            </div>

            <div class="nav-group">
                <div class="nav-label">Feedback</div>
                <a href="/review" class="sidebar-link">
                    <span class="link-icon">💬</span>
                    <span>Review System</span>
                </a>
            </div>

            <div class="nav-group">
                <div class="nav-label">Help Center</div>
                <a href="/terms" class="sidebar-link">
                    <span>Terms & Conditions</span>
                </a>
                <a href="/release-notes" class="sidebar-link">
                    <span>Release Notes</span>
                </a>
                <a href="/pricing.html" class="sidebar-link">
                    <span>Pricing & Plans</span>
                </a>
            </div>
        </nav>
    </aside>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <nav class="navbar" style="position: absolute; top: 20px; left: 40px; right: 40px; display: flex; justify-content: space-between; align-items: center; z-index: 10;">
        <a href="/?revealed=true" class="nav-logo" style="margin-left: 60px;">
            <div class="logo-icon">⚡</div>
            <div class="logo-text">Careerforge <span class="accent">AI</span></div>
        </a>
        <a href="/features" class="btn-start" style="padding: 10px 20px; font-size: 0.9rem; margin-top: 0;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14"/>
                <path d="m12 5 7 7-7 7"/>
            </svg>
            <span>Explore More Tools</span>
        </a>
    </nav>

    <main class="content roadmap-content">
        <div class="container-small">
            <div class="header-section">
                <h1 class="title-small">Build Your <span class="accent">Career Roadmap</span></h1>
                <p class="subtitle">Enter your goals and get a personalized AI-powered roadmap</p>
            </div>

            <section class="input-section glass-card">
                <form id="roadmapForm">
                    <div class="form-group">
                        <label for="career">Enter your dream career</label>
                        <input type="text" id="career" name="career" placeholder="e.g. Data Scientist, Web Developer" required>
                    </div>

                    <div class="form-group">
                        <label for="skills">Your current skills</label>
                        <input type="text" id="skills" name="skills" placeholder="e.g. Python, HTML, Communication" required>
                    </div>


                    <button type="submit" class="btn-start" id="submitBtn" style="width: 100%; margin-top: 10px;">
                        <span id="btnText">Generate Roadmap</span>
                        <svg id="btnIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M5 12h14"/>
                            <path d="m12 5 7 7-7 7"/>
                        </svg>
                        <div id="btnLoader" class="loader" style="display: none;"></div>
                    </button>
                </form>
            </section>

            <div id="resultsSection" class="results-section" style="display: none;">
                <h2 class="section-title">Your Personalized Roadmap</h2>
                <div id="roadmapSteps" class="roadmap-steps">
                    <!-- Steps will be injected here -->
                </div>
            </div>
        </div>
    </main>

    <script src="/js/main.js"></script>
    <script src="/js/career.js"></script>
</body>
</html>
