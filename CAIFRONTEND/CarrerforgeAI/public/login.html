<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CareerforgeAI</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 0 auto;
            text-align: center;
        }
        .content {
            justify-content: center;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(20px);
            margin-top: 30px;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: left;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #818cf8;
        }
        .form-group input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            border-color: #6366f1;
            background: rgba(255, 255, 255, 0.08);
        }
        .btn-auth {
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn-auth:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        .auth-footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #64748b;
        }
        .auth-footer a {
            color: #818cf8;
            font-weight: 600;
        }
        .back-home {
            position: absolute;
            top: 40px;
            left: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #cad4e0;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            z-index: 10;
        }
        .back-home:hover {
            color: white;
            transform: translateX(-5px);
        }
        .admin-top-link {
            position: absolute;
            top: 40px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(244, 63, 94, 0.1);
            border: 1px solid rgba(244, 63, 94, 0.2);
            padding: 8px 16px;
            border-radius: 12px;
            color: #fb7185;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        .admin-top-link:hover {
            background: rgba(244, 63, 94, 0.2);
            border-color: #f43f5e;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(244, 63, 94, 0.2);
        }
        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 5px;
        }
        .role-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 10px;
            color: #cad4e0;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .role-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .role-btn.active {
            background: rgba(99, 102, 241, 0.2);
            border-color: #6366f1;
            color: white;
        }
    </style>
</head>
<body class="page-loaded">
    <div class="bg-overlay"></div>
    
    <a href="/" class="back-home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back to Home
    </a>

    <a href="/login-admin" class="admin-top-link">
        Admin Access
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
    </a>

    <main class="content">
        <div class="auth-container">
            <h1 class="title-small">Welcome <span class="accent">Back</span></h1>
            <p class="subtitle">Enter your credentials to continue.</p>

            <div class="auth-card fade-in">
                <form id="loginForm" class="auth-form" onsubmit="event.preventDefault();">
                    <div class="form-group">
                        <label>Select Role</label>
                        <div class="role-selector">
                            <button type="button" class="role-btn active" data-role="student">Student</button>
                            <button type="button" class="role-btn" data-role="mentor">Mentor</button>
                        </div>
                        <input type="hidden" id="selectedRole" value="student">
                    </div>

                    <div id="commonName" class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="John Doe" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="name@example.com" required>
                    </div>

                    <!-- Role Specific Login Fields -->
                    <div id="mentorLoginFields" class="form-group" style="display: none;">
                        <label for="mentorAccess">Access Code / Specialty</label>
                        <input type="text" id="mentorAccess" placeholder="e.g. CF-MENTOR-AI">
                    </div>

                    <div style="margin-top: 15px;">
                        <div id="g_id_onload"
                             data-client_id="198998709481-iudv2eqkpdap08mjv36oha9ucvfddv9u.apps.googleusercontent.com"
                             data-context="signin"
                             data-ux_mode="popup"
                             data-callback="onGoogleSignIn"
                             data-auto_prompt="false">
                        </div>

                        <div class="g_id_signin"
                             data-type="standard"
                             data-shape="rectangular"
                             data-theme="outline"
                             data-text="signin_with"
                             data-size="large"
                             data-logo_alignment="left">
                        </div>
                    </div>

                </form>

                <div class="auth-footer">
                    Don't have an account? <a href="/signup">Sign Up</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Define the callback synchronously so Google finds it immediately -->
    <script>
        window.onGoogleSignIn = async (response) => {
            if (window.executeGoogleLogin) {
                await window.executeGoogleLogin(response);
            } else {
                console.error("Login module not ready.");
            }
        };
    </script>

    <script src="/js/config.js"></script>
    <!-- Google Identity Services Script -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script type="module">
        import { handleGoogleLogin } from '/js/auth.js?v=4';

        // Role Selection Logic
        const roleBtns = document.querySelectorAll('.role-btn');
        const roleInput = document.getElementById('selectedRole');
        
        // Field groups
        const mentorFields = document.getElementById('mentorLoginFields');

        function updateLoginFields(role) {
            mentorFields.style.display = 'none';
            document.getElementById('mentorAccess').removeAttribute('required');

            if (role === 'mentor') {
                mentorFields.style.display = 'flex';
                document.getElementById('mentorAccess').setAttribute('required', 'true');
            }
        }

        roleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                
                roleBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                roleInput.value = btn.dataset.role;
                updateLoginFields(btn.dataset.role);
            });
        });

        // Actual module-level logic injected into global execution function
        window.executeGoogleLogin = async (response) => {
            const role = roleInput.value;
            await handleGoogleLogin(response, role);
        };
    </script>
</body>
</html>
