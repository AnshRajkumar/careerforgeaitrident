        .contact-container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
            padding-top: 100px;
        }
        .contact-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(20px);
            margin-top: 40px;
        }
        .contact-info {
            margin: 20px 0;
            font-size: 1.2rem;
        }
        .info-label {
            color: #818cf8;
            font-weight: 700;
            display: block;
            margin-bottom: 5px;
        }
        .info-value {
            color: #ffffff;
        }
    </style>
</head>
<body class="page-loaded">
    <div class="bg-overlay"></div>
